<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI Math Tutor 로그인</title>
  <link rel="stylesheet" href="css/app.css">
</head>

<body class="login-page">
  <!-- 로그인/회원가입 배경 장식 -->
  <div class="math-bg">
    <span class="math-symbol symbol-1">＋</span>
    <span class="math-symbol symbol-2">×</span>
    <span class="math-symbol symbol-3">÷</span>
    <span class="math-symbol symbol-4">△</span>
    <span class="math-symbol symbol-5">1234</span>
    <span class="math-symbol symbol-6">√</span>
    <span class="math-symbol symbol-7">＝</span>
  </div>

  <div class="login-container">
    <div class="login-card">
      <!-- 상단 아이콘/제목 영역 -->
      <div class="login-header">
        <div class="login-badge">✏️</div>
        <h1>AI Math Tutor 로그인</h1>
        <p class="login-subtitle">즐거운 수학 공부를 시작해보자!</p>
      </div>

      <!-- 로그인 폼 -->
      <div class="login-form">
        <div class="input-block">
          <label for="username">아이디</label>
          <input type="text" id="username" placeholder="아이디를 입력해줘">
        </div>

        <div class="input-block">
          <label for="password">비밀번호</label>
          <input type="password" id="password" placeholder="비밀번호를 입력해줘" required>
        </div>

        <div class="btn-group">
          <button type="button" class="login-btn" onclick="login()">로그인</button>
          <button type="button" class="signup-btn" onclick="openSignupModal()">회원가입</button>
        </div>

        <p class="login-bottom-text">루미 선생님과 함께하는 수학 교실 💛</p>
      </div>
    </div>
  </div>

  <!-- 회원가입 모달 -->
  <div id="signup-modal" class="modal hidden">
    <div class="modal-content signup-modal-content">
      <div class="signup-header">
        <div class="signup-badge">🌼</div>
        <div>
          <h2>회원가입</h2>
          <p class="signup-subtitle">정보를 입력하고 캐릭터를 골라줘</p>
        </div>
      </div>

      <div class="signup-form-grid">
        <input type="text" id="signup-name" placeholder="이름 입력">
        <input type="text" id="signup-nickname" placeholder="닉네임 입력">
        <input type="text" id="signup-id" placeholder="아이디 입력">
        <input type="password" id="signup-password" placeholder="비밀번호 입력" required>
      </div>

      <div class="character-section">
        <p class="character-title">캐릭터 선택</p>

        <div class="character-list">
          <button type="button" class="character-btn" data-character="bunny">
            <img src="assets/images/bunny.png" alt="버니">
            <span>버니</span>
          </button>

          <button type="button" class="character-btn" data-character="piyo">
            <img src="assets/images/piyo.png" alt="삐요">
            <span>삐요</span>
          </button>

          <button type="button" class="character-btn" data-character="popo">
            <img src="assets/images/popo.png" alt="포포">
            <span>포포</span>
          </button>

          <button type="button" class="character-btn" data-character="roki">
            <img src="assets/images/roki.png" alt="로키">
            <span>로키</span>
          </button>

          <button type="button" class="character-btn" data-character="rumi">
            <img src="assets/images/rumi.png" alt="로미">
            <span>로미</span>
          </button>

          <button type="button" class="character-btn" data-character="tori">
            <img src="assets/images/tori.png" alt="토리">
            <span>토리</span>
          </button>
        </div>
      </div>

      <div class="modal-btn-group">
        <button type="button" class="complete-btn" onclick="signup()">가입완료</button>
        <button type="button" class="close-btn" onclick="closeSignupModal()">닫기</button>
      </div>
    </div>
  </div>

  <!-- 전역 공통 함수 (login, apiFetch, showCustomPopup 등) -->
  <script src="js/app.js"></script>

  <script>
    /* ─────────────────────────────────────────────────────────
     * login.html 전용 인라인 스크립트
     *
     * [포함 기능]
     *   - Enter 키로 로그인 단축키 지원
     *   - openSignupModal() / closeSignupModal() : 회원가입 모달 열고 닫기
     *   - signup() : 회원가입 폼 데이터를 서버에 POST 요청
     *
     * [API - 회원가입]
     *   엔드포인트: POST /auth/register
     *   전송 데이터: { name, nickname, username, password, character }
     *   응답 성공:  HTTP 200 (가입 완료)
     *   응답 실패:  { detail: "오류 메시지" }
     * ───────────────────────────────────────────────────────── */

    /* 비밀번호 입력창에서 Enter 키 누르면 바로 로그인 */
    document.getElementById("password").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        login();
      }
    });

    /* 회원가입 모달 열기 */
    function openSignupModal() {
      document.getElementById("signup-modal").classList.remove("hidden");
    }

    /* 회원가입 모달 닫기 */
    function closeSignupModal() {
      document.getElementById("signup-modal").classList.add("hidden");
    }

    /**
     * signup()
     * 회원가입 폼의 입력값을 검증하고 서버에 가입 요청을 전송합니다.
     * 성공 시 팝업 안내 후 모달을 닫고, 실패 시 오류 메시지를 표시합니다.
     */
    async function signup() {
      // 입력 필드 값 수집 (앞뒤 공백 제거)
      const name      = document.getElementById("signup-name").value.trim();
      const nickname  = document.getElementById("signup-nickname").value.trim();
      const username  = document.getElementById("signup-id").value.trim();
      const password  = document.getElementById("signup-password").value.trim();
      const selectedCharacter = document.querySelector(".character-btn.selected");

      // 필수 항목 미입력 검사
      if (!name || !nickname || !username || !password) {
        showCustomPopup("모든 항목을 입력해 주세요.😄");
        return;
      }

      // 캐릭터 미선택 검사
      if (!selectedCharacter) {
        showCustomPopup("캐릭터를 선택해 주세요.😄");
        return;
      }

      // 선택한 캐릭터의 data-character 속성값 가져오기 (예: "rumi", "bunny")
      const character = selectedCharacter.dataset.character;

      try {
        // POST /auth/register: 회원가입 요청
        const response = await fetch("/auth/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name:      name,
            nickname:  nickname,
            username:  username,
            password:  password,
            character: character
          })
        });

        const data = await response.json();

        if (response.ok) {
          // 가입 성공: 안내 팝업 표시 후 모달 닫기
          showCustomPopup("회원가입 완료!😄");
          closeSignupModal();
        } else {
          // 서버 오류 (중복 아이디 등): 서버 메시지 또는 기본 메시지 표시
          showCustomPopup(data.detail || "회원가입 실패!😢");
        }
      } catch (error) {
        // 네트워크 오류 등 예외 처리
        console.log(error);
        showCustomPopup("회원가입 중 오류가 발생했어요.😢");
      }
    }
  </script>

  <div id="custom-popup" class="popup-overlay">
  <div class="popup-box">
    <div id="popup-message"></div>
    <button onclick="closeCustomPopup()">확인</button>
  </div>
</div>

</body>
</html>
